services:

  # ── PostgreSQL database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: timeclock
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: timeclock
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timeclock"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Run DB migrations once on startup ────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: builder
    working_dir: /app
    command: pnpm --filter @workspace/db run push-force
    environment:
      DATABASE_URL: postgresql://timeclock:${DB_PASSWORD}@postgres:5432/timeclock
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── API server ────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: production
    environment:
      DATABASE_URL: postgresql://timeclock:${DB_PASSWORD}@postgres:5432/timeclock
      SESSION_SECRET: ${SESSION_SECRET}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_PROXY_URL: ${CLERK_PROXY_URL:-}
      LICENSE_KEY: ${LICENSE_KEY:-}
      NODE_ENV: production
      PORT: 8080
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Frontend (nginx serves static files + proxies /api/) ──────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
